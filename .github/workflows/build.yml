name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - platform: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Node.js setup
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Rust setup
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: cd src/frontend && npm ci

      - name: Install root dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Quark ${{ github.ref_name }}'
          releaseBody: |
            Quark QR-Generator ${{ github.ref_name }}
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}

      # ── AppImage: gebündelte Bibliotheken entfernen ──────────────────────────
      # Problem: linuxdeploy bündelt webkit2gtk + GStreamer aus Ubuntu 22.04.
      # Auf neueren Distros (Fedora, Bazzite, Arch) kollidieren diese mit den
      # System-Bibliotheken → Absturz.
      # Fix: usr/lib/ komplett entfernen → System-Bibliotheken werden verwendet.
      # Nach dem Umpacken: AppImage neu signieren → .tar.gz erstellen + signieren.
      - name: AppImage entbündeln, neu packen und signieren (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          V="${{ github.ref_name }}"
          V="${V#v}"
          BASE="${GITHUB_WORKSPACE}/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage"
          APPIMAGE="$BASE/Quark_${V}_amd64.AppImage"
          SQUASH="${GITHUB_WORKSPACE}/squashfs-root"

          echo "=== AppImage entbündeln ==="
          chmod +x "$APPIMAGE"
          "$APPIMAGE" --appimage-extract

          echo "=== usr/lib vor dem Entfernen ==="
          du -sh "$SQUASH/usr/lib/" 2>/dev/null || echo "(leer)"

          rm -rf "$SQUASH/usr/lib/"
          echo "=== usr/lib/ entfernt ==="

          wget -qO /tmp/appimagetool \
            "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x /tmp/appimagetool
          ARCH=x86_64 /tmp/appimagetool --appimage-extract-and-run "$SQUASH" "$APPIMAGE"
          echo "AppImage neu gepackt: $(du -sh "$APPIMAGE" | cut -f1)"
          rm -rf "$SQUASH"

          # ── AppImage neu signieren ──────────────────────────────────────────
          curl -sSL https://github.com/jedisct1/minisign/releases/download/0.12/minisign-0.12-linux.tar.gz \
            | tar -xz --strip-components=2 -C /usr/local/bin minisign-linux/x86_64/minisign
          chmod +x /usr/local/bin/minisign

          # Key entschlüsseln (base64-kodiert oder raw)
          KEYFILE=$(mktemp)
          STRIPPED=$(echo "$TAURI_SIGNING_PRIVATE_KEY" | tr -d '[:space:]')
          if echo "$STRIPPED" | base64 -d 2>/dev/null | grep -q "^untrusted comment:"; then
            echo "$STRIPPED" | base64 -d > "$KEYFILE"
          else
            printf '%s' "$TAURI_SIGNING_PRIVATE_KEY" | sed 's/\\n/\n/g' > "$KEYFILE"
          fi

          # .tar.gz erstellen und signieren
          TAR="${APPIMAGE}.tar.gz"
          tar -czf "$TAR" -C "$BASE" "Quark_${V}_amd64.AppImage"
          printf '%s\n' "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD:-}" \
            | minisign -SHm "$TAR" -s "$KEYFILE" -x "${TAR}.sig"
          rm -f "$KEYFILE"
          echo "Signiert: ${TAR}.sig"

          # AppImage + .tar.gz + .sig hochladen
          gh release upload "${{ github.ref_name }}" "$APPIMAGE" --clobber
          gh release upload "${{ github.ref_name }}" "$TAR" "${TAR}.sig" --clobber

          # Versions-loses AppImage für stabilen Download-Link
          APPIMAGE_NOVERSION="$BASE/Quark_amd64.AppImage"
          cp "$APPIMAGE" "$APPIMAGE_NOVERSION"
          gh release upload "${{ github.ref_name }}" "$APPIMAGE_NOVERSION" --clobber

          # Desktop-Integrations-Skript hochladen
          gh release upload "${{ github.ref_name }}" \
            "${GITHUB_WORKSPACE}/scripts/install-linux.sh" --clobber

      # ── Windows: .nsis.zip + .sig hochladen ─────────────────────────────────
      - name: Updater-ZIP und Signatur hochladen (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          $V = "${{ github.ref_name }}".TrimStart('v')
          $base = "${{ github.workspace }}\src-tauri\target\x86_64-pc-windows-msvc\release\bundle\nsis"
          $exe  = "$base\Quark_${V}_x64-setup.exe"
          $zip  = "$base\Quark_${V}_x64-setup.nsis.zip"
          $sig  = "${zip}.sig"

          # .nsis.zip erstellen falls nicht vorhanden
          if (-not (Test-Path $zip)) {
            $exeName = Split-Path -Leaf $exe
            python -c "import zipfile; zf = zipfile.ZipFile(r'$zip', 'w', zipfile.ZIP_STORED); zf.write(r'$exe', '$exeName'); zf.close()"
          }

          # .sig erstellen falls nicht vorhanden
          if (-not (Test-Path $sig)) {
            Invoke-WebRequest -Uri "https://github.com/jedisct1/minisign/releases/download/0.12/minisign-0.12-win64.zip" `
              -OutFile "$env:TEMP\minisign.zip"
            Expand-Archive -Path "$env:TEMP\minisign.zip" -DestinationPath "$env:TEMP\minisign-bin" -Force
            $minisign = "$env:TEMP\minisign-bin\minisign-win64\x86_64\minisign.exe"

            $keyContent = $env:TAURI_SIGNING_PRIVATE_KEY
            $keyFile = [System.IO.Path]::GetTempFileName() + ".key"
            $stripped = $keyContent -replace '[\s]', ''
            try {
              $decoded = [System.Text.Encoding]::UTF8.GetString([Convert]::FromBase64String($stripped))
              if ($decoded.StartsWith("untrusted comment:")) {
                [System.IO.File]::WriteAllText($keyFile, $decoded)
              } else { throw }
            } catch {
              [System.IO.File]::WriteAllText($keyFile, ($keyContent -replace '\\n', "`n"))
            }

            $env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD | & $minisign -SHm "$zip" -s "$keyFile" -x "$sig"
            Remove-Item $keyFile -Force
          }

          gh release upload "${{ github.ref_name }}" "$zip" "$sig" --clobber

  # ── latest.json aus Release-Signaturen zusammenbauen ────────────────────────
  updater-json:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Signaturen vom Release herunterladen
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir sigs
          gh release download "${{ github.ref_name }}" \
            --pattern "*.sig" \
            --dir sigs \
            --repo "${{ github.repository }}"
          echo "=== Heruntergeladene Signaturen ==="
          ls -la sigs/

      - name: latest.json generieren und hochladen
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          REPO="${{ github.repository }}"
          BASE="https://github.com/${REPO}/releases/download/${TAG}"

          python3 << PYEOF
          import json, os, base64, datetime

          v    = os.environ['VERSION']
          tag  = os.environ['TAG']
          base = os.environ['BASE']

          def sig_b64(path):
              return base64.b64encode(open(path, 'rb').read()).decode('ascii')

          data = {
            'version': v,
            'notes': f'Quark {v}',
            'pub_date': datetime.datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ'),
            'platforms': {
              'linux-x86_64': {
                'signature': sig_b64(f'sigs/Quark_{v}_amd64.AppImage.tar.gz.sig'),
                'url': f'{base}/Quark_{v}_amd64.AppImage.tar.gz',
              },
              'windows-x86_64': {
                'signature': sig_b64(f'sigs/Quark_{v}_x64-setup.nsis.zip.sig'),
                'url': f'{base}/Quark_{v}_x64-setup.nsis.zip',
              },
            },
          }
          json.dump(data, open('latest.json', 'w'), indent=2)
          print('latest.json generiert:')
          print(json.dumps(data, indent=2))
          PYEOF

          gh release upload "${TAG}" latest.json --clobber
