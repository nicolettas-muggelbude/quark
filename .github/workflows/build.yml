name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            artifact: AppImage
            ext: AppImage
          - platform: windows-latest
            artifact: NSIS
            ext: exe

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Node.js setup
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Rust setup
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: cd src/frontend && npm ci

      - name: Install root dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Quark ${{ github.ref_name }}'
          releaseBody: |
            Quark QR-Generator ${{ github.ref_name }}
          releaseDraft: false
          prerelease: false

      # ── AppImage: gebündelte Bibliotheken entfernen ──────────────────────────
      # Problem: linuxdeploy bündelt webkit2gtk + GStreamer aus Ubuntu 22.04.
      # Auf neueren Distros (Fedora, Bazzite, Arch) kollidieren diese mit den
      # System-Bibliotheken → Absturz.
      # Fix: usr/lib/ komplett entfernen → System-Bibliotheken werden verwendet.
      - name: AppImage Bibliotheken entbündeln (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          V="${{ github.ref_name }}"
          V="${V#v}"
          BASE="${GITHUB_WORKSPACE}/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage"
          APPIMAGE="$BASE/Quark_${V}_amd64.AppImage"
          SQUASH="${GITHUB_WORKSPACE}/squashfs-root"

          chmod +x "$APPIMAGE"
          "$APPIMAGE" --appimage-extract

          echo "=== usr/lib vor dem Entfernen ==="
          du -sh "$SQUASH/usr/lib/" 2>/dev/null || echo "(leer)"

          rm -rf "$SQUASH/usr/lib/"
          echo "=== usr/lib/ entfernt – System-Bibliotheken werden verwendet ==="

          wget -qO /tmp/appimagetool \
            "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x /tmp/appimagetool
          ARCH=x86_64 /tmp/appimagetool --appimage-extract-and-run "$SQUASH" "$APPIMAGE"
          echo "AppImage neu gepackt: $(du -sh "$APPIMAGE" | cut -f1)"

          gh release upload "${{ github.ref_name }}" "$APPIMAGE" --clobber
          rm -rf "$SQUASH"
