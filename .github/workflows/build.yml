name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            artifact: AppImage
            ext: AppImage
          - platform: windows-latest
            artifact: NSIS
            ext: exe

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Node.js setup
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Rust setup
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            minisign

      - name: Install frontend dependencies
        run: cd src/frontend && npm ci

      - name: Install root dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Quark ${{ github.ref_name }}'
          releaseBody: |
            Quark QR-Generator ${{ github.ref_name }}
          releaseDraft: false
          prerelease: false

      # ── AppImage: gebündelte Bibliotheken entfernen ──────────────────────────
      # Problem: linuxdeploy bündelt webkit2gtk + GStreamer aus Ubuntu 22.04.
      # Auf neueren Distros (Fedora, Bazzite, Arch) kollidieren diese mit den
      # System-Bibliotheken → Absturz.
      # Fix: usr/lib/ komplett entfernen → System-Bibliotheken werden verwendet.
      # Nach dem Umpacken wird das AppImage neu signiert, damit der Updater
      # die Signatur verifizieren kann.
      - name: AppImage entbündeln, neu packen und signieren (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          echo "=== AppImage suchen ==="
          find "${GITHUB_WORKSPACE}/src-tauri/target" -name "*.AppImage" 2>/dev/null || echo "(keine AppImage gefunden)"
          APPIMAGE=$(find "${GITHUB_WORKSPACE}/src-tauri/target/release/bundle/appimage" \
                         "${GITHUB_WORKSPACE}/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage" \
                         -name "*.AppImage" 2>/dev/null | head -1)
          if [ -z "$APPIMAGE" ]; then
            echo "Fehler: Kein AppImage gefunden"
            exit 1
          fi
          echo "AppImage gefunden: $APPIMAGE"
          SQUASH="${GITHUB_WORKSPACE}/squashfs-root"

          chmod +x "$APPIMAGE"
          "$APPIMAGE" --appimage-extract

          echo "=== usr/lib vor dem Entfernen ==="
          du -sh "$SQUASH/usr/lib/" 2>/dev/null || echo "(leer)"

          rm -rf "$SQUASH/usr/lib/"
          echo "=== usr/lib/ entfernt – System-Bibliotheken werden verwendet ==="

          wget -qO /tmp/appimagetool \
            "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x /tmp/appimagetool
          ARCH=x86_64 /tmp/appimagetool --appimage-extract-and-run "$SQUASH" "$APPIMAGE"
          echo "AppImage neu gepackt: $(du -sh "$APPIMAGE" | cut -f1)"

          # ── AppImage neu signieren ────────────────────────────────────────────
          echo "$TAURI_SIGNING_PRIVATE_KEY" | base64 -d > /tmp/tauri.key
          printf "%s\n" "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD:-}" \
            | minisign -S -s /tmp/tauri.key -m "$APPIMAGE" -t "signature from quark build"
          rm -f /tmp/tauri.key
          echo "AppImage signiert: $APPIMAGE.sig"

          gh release upload "${{ github.ref_name }}" "$APPIMAGE" --clobber

          # Versions-loses AppImage für stabilen Download-Link
          APPIMAGE_NOVERSION="$(dirname "$APPIMAGE")/Quark_amd64.AppImage"
          cp "$APPIMAGE" "$APPIMAGE_NOVERSION"
          gh release upload "${{ github.ref_name }}" "$APPIMAGE_NOVERSION" --clobber

          # Desktop-Integrations-Skript hochladen
          gh release upload "${{ github.ref_name }}" \
            "${GITHUB_WORKSPACE}/scripts/install-linux.sh" --clobber

          rm -rf "$SQUASH"

          # Signatur-Datei für publish-Job bereitstellen
          echo "APPIMAGE_SIG=$APPIMAGE.sig" >> "$GITHUB_ENV"
          echo "APPIMAGE_URL=https://github.com/nicolettas-muggelbude/quark/releases/download/${{ github.ref_name }}/$(basename "$APPIMAGE")" >> "$GITHUB_ENV"

      - name: Linux-Signatur als Artifact hochladen
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: linux-sig
          path: ${{ env.APPIMAGE_SIG }}

      - name: Windows-Signatur als Artifact hochladen
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows-sig
          path: src-tauri/target/release/bundle/nsis/*.exe.sig

  # ── latest.json aus beiden Plattform-Signaturen zusammenbauen ───────────────
  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Signaturen herunterladen
        uses: actions/download-artifact@v4
        with:
          path: sigs

      - name: latest.json generieren und hochladen
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"

          LINUX_SIG=$(cat sigs/linux-sig/*.sig)
          WINDOWS_SIG=$(cat sigs/windows-sig/*.sig)

          jq -n \
            --arg version "$VERSION" \
            --arg linux_sig "$LINUX_SIG" \
            --arg linux_url "https://github.com/nicolettas-muggelbude/quark/releases/download/${TAG}/Quark_${VERSION}_amd64.AppImage" \
            --arg windows_sig "$WINDOWS_SIG" \
            --arg windows_url "https://github.com/nicolettas-muggelbude/quark/releases/download/${TAG}/Quark_${VERSION}_x64-setup.exe" \
            '{
              version: $version,
              notes: ("Quark " + $version),
              pub_date: (now | todate),
              platforms: {
                "linux-x86_64": {
                  signature: $linux_sig,
                  url: $linux_url
                },
                "windows-x86_64": {
                  signature: $windows_sig,
                  url: $windows_url
                }
              }
            }' > latest.json

          echo "=== latest.json ==="
          cat latest.json

          gh release upload "${TAG}" latest.json --clobber
